<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로필 페이지</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background-color: #000;
        }

        /* 씬 공통 스타일 */
        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
            z-index: 1;
        }

        .scene.active {
            opacity: 1;
            pointer-events: all;
            z-index: 2;
        }

        /* 배경 wrapper */
        .background-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        .bg-sea {
            background-image: url('data/sea.png');
        }

        .bg-sugar {
            background-image: url('data/sugar.png');
        }

        .bg-darkplanet {
            background-image: url('data/darkplanet.png');
        }

        .bg-card {
            background-image: url('data/card.png');
        }

        /* 네비게이션 버튼 */
        .nav-buttons {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            transform: translateY(-50%);
            z-index: 1000;
            display: none;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            pointer-events: none; /* 빈 공간 클릭 통과 */
        }

        .nav-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            transition: background 0.3s, transform 0.3s;
            user-select: none;
            pointer-events: auto; /* 버튼 부분만 클릭 가능하게 설정 */
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.1);
        }

        /* Scene 2~4 특화 요소 */
        .planetHoverArea {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border-radius: 50%;
            z-index: 10;
            cursor: pointer;
        }

        .speechBubble {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -200px); /* 행성 위쪽 */
            background-color: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 15px 30px;
            color: #fff;
            font-size: 1.3rem;
            font-weight: 600;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease, transform 0.4s ease;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            white-space: nowrap;
            z-index: 11;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 말풍선 꼬리표 */
        .speechBubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: rgba(255, 255, 255, 0.4) transparent transparent transparent;
        }

        .planetHoverArea:hover + .speechBubble,
        .speechBubble:hover {
            opacity: 1;
            transform: translate(-50%, -220px); /* 약간 위로 떠오르는 효과 */
            pointer-events: auto;
        }

        /* 말풍선 호버 유지를 위한 가상 요소 */
        .speechBubble::before {
            content: '';
            position: absolute;
            bottom: -40px;
            left: 0;
            width: 100%;
            height: 40px;
        }

        /* 링크 복사 아이콘 */
        .copy-icon {
            display: inline-block;
            margin-left: 10px;
            cursor: pointer;
            width: 24px;
            height: 24px;
            transition: transform 0.2s, opacity 0.2s;
            opacity: 0.8;
            color: #fff;
        }

        .copy-icon:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .copy-icon:active {
            transform: scale(0.95);
        }

        /* 토스트 알림 */
        #toastNotification {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 400;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease, transform 0.4s ease;
            z-index: 2000;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #toastNotification.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-10px);
        }

        /* 프로필 카드 (Scene 3 전용) */
        .profileCard {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 320px;
            height: 320px;
            background-color: rgba(30, 30, 30, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 30px;
            box-sizing: border-box;
            color: #fff;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease, transform 0.4s ease;
            z-index: 12;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .planetHoverArea:hover + .profileCard,
        .profileCard:hover {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }

        .profile-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-align: center;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .profile-item {
            font-size: 1.1rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            padding-left: 10%;
            box-sizing: border-box;
            white-space: nowrap;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        /* 2등분 중 위쪽 영역 (별이 위치할 곳) */
        .top-half {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            z-index: 3;
        }

        #linesContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        /* 2등분 중 아래쪽 영역 */
        .bottom-half {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            z-index: 2;
        }

        /* 하얀색 점 (별 역할) */
        .star {
            position: absolute;
            background-color: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 12px 3px rgba(255, 255, 255, 0.8);
            animation: twinkle 3s infinite ease-in-out alternate;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            -webkit-user-drag: none;
        }

        .star:hover {
            transform: scale(4);
            box-shadow: 0 0 20px 8px rgba(255, 255, 255, 1);
            animation-play-state: paused;
            z-index: 10;
        }


        /* 별 반짝임 애니메이션 */
        @keyframes twinkle {
            0% {
                opacity: 0.3;
            }

            100% {
                opacity: 1;
            }
        }

        /* 5개의 하얀색 점(별) 위치 지정 (위쪽 50% 영역 내, 기존 2배 크기) 삭제됨 -> 각 태그 내 inline style로 들어감 */

        /* 모든 별이 연결되었을 때의 동기화된 반짝임 */
        .all-connected .star {
            animation: syncTwinkle 1s infinite alternate ease-in-out !important;
            animation-delay: 0s !important;
        }

        .all-connected .permanent-line {
            animation: syncTwinkle 1s infinite alternate ease-in-out !important;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.8));
        }

        @keyframes syncTwinkle {
            0% {
                opacity: 0.2;
            }

            100% {
                opacity: 1;
            }
        }
    
        /* 거대해지는 별 클래스 */
        .all-connected .star.giant-star {
            animation: none !important;
            opacity: 1 !important;
            transform: scale(500) !important;
            z-index: 9999 !important;
            transition: transform 2s ease-in-out !important;
            box-shadow: none !important;
            cursor: default !important;
        }

        #instructionText {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            text-shadow: 0 2px 10px rgba(255,255,255,0.8);
            z-index: 10;
            pointer-events: none;
            animation: pulseText 2s infinite ease-in-out;
            transition: opacity 0.8s;
        }

        @keyframes pulseText {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

    
        #fadeOverlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
            transition: opacity 2s ease;
        }

        #fadeOverlay.active {
            opacity: 1;
            pointer-events: all;
        }

    </style>
</head>

<body>

    <script>
        let toastTimeout;
        function showToast() {
            const toast = document.getElementById('toastNotification');
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        function copyLink(link) {
            const textArea = document.createElement("textarea");
            textArea.value = link;
            textArea.style.position = "fixed";
            textArea.style.left = "-999999px";
            textArea.style.top = "-999999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            try {
                document.execCommand('copy');
                showToast();
            } catch (err) {
                console.error('Unable to copy', err);
                alert("복사에 실패했습니다.");
            }

            document.body.removeChild(textArea);
        }

        let currentScene = 1;
        const totalScenes = 4;

        function switchScene(sceneNum) {
            document.querySelectorAll('.scene').forEach(scene => {
                scene.classList.remove('active');
            });
            const targetScene = document.getElementById('scene' + sceneNum);
            if (targetScene) {
                targetScene.classList.add('active');
            }
            currentScene = sceneNum;
            
            // 네비게이션 버튼 표시 여부 (씬 2 이상에서만 보임)
            const navButtons = document.querySelector('.nav-buttons');
            if (sceneNum >= 2) {
                navButtons.style.display = 'flex';
            } else {
                navButtons.style.display = 'none';
            }
            
            // fadeOverlay가 켜져있다면 없앰 (씬 전환 완료)
            const fadeOverlay = document.getElementById('fadeOverlay');
            if (fadeOverlay && fadeOverlay.classList.contains('active')) {
                fadeOverlay.classList.remove('active');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            // 네비게이션 버튼 이벤트 (씬 2, 3, 4 순환)
            document.getElementById('prevBtn').addEventListener('click', () => {
                let next = currentScene - 1;
                if (next < 2) next = 4;
                switchScene(next);
            });

            document.getElementById('nextBtn').addEventListener('click', () => {
                let next = currentScene + 1;
                if (next > 4) next = 2;
                switchScene(next);
            });

            window.resetScene1Effects = function() {
                document.body.classList.remove('all-connected');
                if (window.twinkleTimeout) {
                    clearTimeout(window.twinkleTimeout);
                    window.twinkleTimeout = null;
                }
                const giant = document.querySelector('.giant-star');
                if (giant) giant.classList.remove('giant-star');
                
                const starContainer = document.getElementById('starContainer');
                const linesContainer = document.getElementById('linesContainer');
                if (starContainer) {
                    starContainer.style.transition = '';
                    starContainer.style.opacity = '1';
                }
                if (linesContainer) {
                    linesContainer.style.transition = '';
                    linesContainer.style.opacity = '1';
                }
            };

            const starA = document.getElementById('starA');
            const newIcon = document.getElementById('newIcon');

            starA.addEventListener('contextmenu', (e) => {
                e.preventDefault(); // 기본 우클릭 메뉴 방지

                // 마우스 위치에 새 아이콘 표시
                newIcon.style.display = 'block';
                newIcon.style.left = (e.pageX + 15) + 'px';
                newIcon.style.top = (e.pageY + 15) + 'px';
            });

            // 빈 공간(다른 곳)을 좌클릭할 때 아이콘 숨기기
            document.addEventListener('click', (e) => {
                if (e.target !== starA) {
                    newIcon.style.display = 'none';
                }
            });

            // 빈 공간(다른 곳)을 우클릭할 때 아이콘 숨기기
            document.addEventListener('contextmenu', (e) => {
                if (e.target !== starA) {
                    newIcon.style.display = 'none';
                }
            });


            // --- 별 연결하기 로직 시작 ---

            const svgContainer = document.getElementById('linesContainer');
            const stars = document.querySelectorAll('.star');
            let isDrawing = false;
            let startStar = null;
            let currentLine = null;
            const connections = new Set();
            const linesMap = new Map(); // 'A-B' -> SVG line element

            // 별을 잡았을 때 (그리기 시작)
            stars.forEach(star => {
                star.addEventListener('mousedown', (e) => {
                    // 좌클릭(0)만 처리
                    if (e.button !== 0) return;
                    e.preventDefault();

                    isDrawing = true;
                    startStar = star;

                    currentLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    const startRect = startStar.getBoundingClientRect();
                    const startX = startRect.left + startRect.width / 2;
                    const startY = startRect.top + startRect.height / 2;

                    currentLine.setAttribute('x1', startX);
                    currentLine.setAttribute('y1', startY);
                    currentLine.setAttribute('x2', e.clientX);
                    currentLine.setAttribute('y2', e.clientY);
                    currentLine.setAttribute('stroke', '#ffffff');
                    currentLine.setAttribute('stroke-width', '2');
                    currentLine.style.pointerEvents = 'none'; // 이벤트 방해 방지

                    svgContainer.appendChild(currentLine);
                });
            });

            // 마우스 이동 시 (선끝 변경)
            window.addEventListener('mousemove', (e) => {
                if (!isDrawing || !currentLine) return;
                currentLine.setAttribute('x2', e.clientX);
                currentLine.setAttribute('y2', e.clientY);
            });

            // 드래그 종료 시 (별과 연결 여부 확인)
            window.addEventListener('mouseup', (e) => {
                if (!isDrawing) return;
                isDrawing = false;

                // 마우스 아래에 있는 요소 파악
                let targetElement = document.elementFromPoint(e.clientX, e.clientY);
                let endStar = targetElement?.closest('.star');

                if (endStar && endStar !== startStar) {
                    const startName = startStar.getAttribute('data-name');
                    const endName = endStar.getAttribute('data-name');
                    const connectionId = [startName, endName].sort().join('-');

                    // 아직 연결되지 않은 두 별이라면
                    if (!connections.has(connectionId)) {

                        connections.add(connectionId);

                        const endRect = endStar.getBoundingClientRect();
                        const endX = endRect.left + endRect.width / 2;
                        const endY = endRect.top + endRect.height / 2;

                        currentLine.setAttribute('x2', endX);
                        currentLine.setAttribute('y2', endY);
                        currentLine.classList.add('permanent-line');

                        linesMap.set(connectionId, currentLine);

                        checkAllConnected();
                    } else {
                        // 이미 연결된 경우 드래그하던 선 제거 및 기존 연결도 해제
                        currentLine.remove();
                        const oldLine = linesMap.get(connectionId);
                        if (oldLine) oldLine.remove();
                        linesMap.delete(connectionId);
                        connections.delete(connectionId);

                        checkAllConnected();
                    }
                } else {
                    // 다른 별에 드롭하지 않은 경우 선 무효화
                    currentLine.remove();
                }

                currentLine = null;
                startStar = null;
            });

            // 모든 별이 1개의 뭉치(컴포넌트)로 연결되었는지 검사하는 함수
            function checkAllConnected() {
                const starsElements = document.querySelectorAll('.star');
                const nodes = Array.from(starsElements).map(s => s.getAttribute('data-name'));

                if (nodes.length === 0) return;

                const adj = {};
                nodes.forEach(n => adj[n] = []);

                connections.forEach(conn => {
                    const [u, v] = conn.split('-');
                    if (adj[u] && adj[v]) { // 노드가 존재할 경우만 연결 추가
                        adj[u].push(v);
                        adj[v].push(u);
                    }
                });

                const visited = new Set();
                const dfs = (node) => {
                    visited.add(node);
                    adj[node].forEach(neighbor => {
                        if (!visited.has(neighbor)) {
                            dfs(neighbor);
                        }
                    });
                };

                dfs(nodes[0]); // 첫 번째 노드에서 시작

                // 모든 노드에 도달했다면 하나의 연결된 그래프가 된 것
                if (visited.size === nodes.length) {
                    if (!document.body.classList.contains('all-connected')) {
                        document.body.classList.add('all-connected');
                        const instruction = document.getElementById('instructionText');
                        if (instruction) instruction.style.opacity = '0';
                        
                        // 1. 별들이 2초간 반짝임
                        if (!window.twinkleTimeout) {
                            window.twinkleTimeout = setTimeout(() => {
                                // 2. 무작위로 별 하나가 커지며 화면 뒤덮음
                                const allStars = document.querySelectorAll('.star');
                                const randomStar = allStars[Math.floor(Math.random() * allStars.length)];
                                
                                randomStar.classList.add('giant-star');
                                
                                // 커지는 데 2초 소요
                                setTimeout(() => {
                                    // 3. 3초 동안 유지
                                    setTimeout(() => {
                                        // 점점 별들이 투명해지며
                                        const starContainer = document.getElementById('starContainer');
                                        const linesContainer = document.getElementById('linesContainer');
                                        if (starContainer) {
                                            starContainer.style.transition = 'opacity 2s ease';
                                            starContainer.style.opacity = '0';
                                        }
                                        if (linesContainer) {
                                            linesContainer.style.transition = 'opacity 2s ease';
                                            linesContainer.style.opacity = '0';
                                        }
                                        
                                        // 다음 장면으로 넘어감 (페이드 오버레이 활성화)
                                        const fadeOverlay = document.getElementById('fadeOverlay');
                                        if (fadeOverlay) fadeOverlay.classList.add('active');
                                        
                                        // 씬2로 전환
                                        setTimeout(() => {
                                            switchScene(2);
                                            // 씬을 전환한 후 씬1의 효과들은 리셋
                                            if (window.resetScene1Effects) window.resetScene1Effects();
                                        }, 2000); // 페이드 오버레이가 검어지는데 2초 소요 후
                                        
                                    }, 3000);
                                }, 2000);
                            }, 2000);
                        }
                    }
                } else {
                    if (window.resetScene1Effects) window.resetScene1Effects();
                }
            }

            // 창 크기 변경 시 그려진 선들의 좌표도 별 위치에 맞게 업데이트
            window.addEventListener('resize', () => {
                linesMap.forEach((line, connId) => {
                    const [startName, endName] = connId.split('-');
                    const s = document.querySelector(`.star[data-name="${startName}"]`);
                    const e = document.querySelector(`.star[data-name="${endName}"]`);
                    if (s && e) {
                        const sr = s.getBoundingClientRect();
                        const er = e.getBoundingClientRect();
                        line.setAttribute('x1', sr.left + sr.width / 2);
                        line.setAttribute('y1', sr.top + sr.height / 2);
                        line.setAttribute('x2', er.left + er.width / 2);
                        line.setAttribute('y2', er.top + er.height / 2);
                    }
                });
            });
            // --- 별 연결하기 로직 끝 ---
        });
    </script>
</body>

</html>
