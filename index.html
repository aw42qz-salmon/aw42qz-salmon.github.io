<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로필 페이지</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background-color: #000;
        }

        /* 배경 wrapper (sea.png) */
        .background-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data/sea.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* 2등분 중 위쪽 영역 (별이 위치할 곳) */
        .top-half {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            z-index: 3;
        }

        #linesContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        /* 2등분 중 아래쪽 영역 */
        .bottom-half {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            z-index: 2;
        }

        /* 하얀색 점 (별 역할) */
        .star {
            position: absolute;
            background-color: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 12px 3px rgba(255, 255, 255, 0.8);
            animation: twinkle 3s infinite ease-in-out alternate;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            -webkit-user-drag: none;
        }

        .star:hover {
            transform: scale(4);
            box-shadow: 0 0 20px 8px rgba(255, 255, 255, 1);
            animation-play-state: paused;
            z-index: 10;
        }


        /* 별 반짝임 애니메이션 */
        @keyframes twinkle {
            0% {
                opacity: 0.3;
            }

            100% {
                opacity: 1;
            }
        }

        /* 5개의 하얀색 점(별) 위치 지정 (위쪽 50% 영역 내, 기존 2배 크기) 삭제됨 -> 각 태그 내 inline style로 들어감 */

        /* 모든 별이 연결되었을 때의 동기화된 반짝임 */
        .all-connected .star {
            animation: syncTwinkle 1s infinite alternate ease-in-out !important;
            animation-delay: 0s !important;
        }

        .all-connected .permanent-line {
            animation: syncTwinkle 1s infinite alternate ease-in-out !important;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.8));
        }

        @keyframes syncTwinkle {
            0% {
                opacity: 0.2;
            }

            100% {
                opacity: 1;
            }
        }
    </style>
</head>

    <!-- 새로 열리는 아이콘 (A 별 우클릭 시 표시됨) -->
    <div id="newIcon"
        style="display: none; position: absolute; z-index: 50; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.4); padding: 15px 25px; border-radius: 12px; color: #fff; font-size: 1.2rem; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">
        🌟 시크릿 메뉴가 열렸습니다 🌟
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const starA = document.getElementById('starA');
            const newIcon = document.getElementById('newIcon');

            starA.addEventListener('contextmenu', (e) => {
                e.preventDefault(); // 기본 우클릭 메뉴 방지

                // 마우스 위치에 새 아이콘 표시
                newIcon.style.display = 'block';
                newIcon.style.left = (e.pageX + 15) + 'px';
                newIcon.style.top = (e.pageY + 15) + 'px';
            });

            // 빈 공간(다른 곳)을 좌클릭할 때 아이콘 숨기기
            document.addEventListener('click', (e) => {
                if (e.target !== starA) {
                    newIcon.style.display = 'none';
                }
            });

            // 빈 공간(다른 곳)을 우클릭할 때 아이콘 숨기기
            document.addEventListener('contextmenu', (e) => {
                if (e.target !== starA) {
                    newIcon.style.display = 'none';
                }
            });

            // --- 별 연결하기 로직 시작 ---
            const svgContainer = document.getElementById('linesContainer');
            const stars = document.querySelectorAll('.star');
            let isDrawing = false;
            let startStar = null;
            let currentLine = null;
            const connections = new Set();
            const linesMap = new Map(); // 'A-B' -> SVG line element

            // 별을 잡았을 때 (그리기 시작)
            stars.forEach(star => {
                star.addEventListener('mousedown', (e) => {
                    // 좌클릭(0)만 처리
                    if (e.button !== 0) return;
                    e.preventDefault();

                    isDrawing = true;
                    startStar = star;

                    currentLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    const startRect = startStar.getBoundingClientRect();
                    const startX = startRect.left + startRect.width / 2;
                    const startY = startRect.top + startRect.height / 2;

                    currentLine.setAttribute('x1', startX);
                    currentLine.setAttribute('y1', startY);
                    currentLine.setAttribute('x2', e.clientX);
                    currentLine.setAttribute('y2', e.clientY);
                    currentLine.setAttribute('stroke', '#ffffff');
                    currentLine.setAttribute('stroke-width', '2');
                    currentLine.style.pointerEvents = 'none'; // 이벤트 방해 방지

                    svgContainer.appendChild(currentLine);
                });
            });

            // 마우스 이동 시 (선끝 변경)
            window.addEventListener('mousemove', (e) => {
                if (!isDrawing || !currentLine) return;
                currentLine.setAttribute('x2', e.clientX);
                currentLine.setAttribute('y2', e.clientY);
            });

            // 드래그 종료 시 (별과 연결 여부 확인)
            window.addEventListener('mouseup', (e) => {
                if (!isDrawing) return;
                isDrawing = false;

                // 마우스 아래에 있는 요소 파악
                let targetElement = document.elementFromPoint(e.clientX, e.clientY);
                let endStar = targetElement?.closest('.star');

                if (endStar && endStar !== startStar) {
                    const startName = startStar.getAttribute('data-name');
                    const endName = endStar.getAttribute('data-name');
                    const connectionId = [startName, endName].sort().join('-');

                    // 아직 연결되지 않은 두 별이라면
                    if (!connections.has(connectionId)) {
                        connections.add(connectionId);

                        const endRect = endStar.getBoundingClientRect();
                        const endX = endRect.left + endRect.width / 2;
                        const endY = endRect.top + endRect.height / 2;

                        currentLine.setAttribute('x2', endX);
                        currentLine.setAttribute('y2', endY);
                        currentLine.classList.add('permanent-line');

                        linesMap.set(connectionId, currentLine);

                        checkAllConnected();
                    } else {
                        // 이미 연결된 경우 드래그하던 선 제거 및 기존 연결도 해제
                        currentLine.remove();
                        const oldLine = linesMap.get(connectionId);
                        if (oldLine) oldLine.remove();
                        linesMap.delete(connectionId);
                        connections.delete(connectionId);

                        checkAllConnected();
                    }
                } else {
                    // 다른 별에 드롭하지 않은 경우 선 무효화
                    currentLine.remove();
                }

                currentLine = null;
                startStar = null;
            });

            // 모든 별이 1개의 뭉치(컴포넌트)로 연결되었는지 검사하는 함수
            function checkAllConnected() {
                const starsElements = document.querySelectorAll('.star');
                const nodes = Array.from(starsElements).map(s => s.getAttribute('data-name'));

                if (nodes.length === 0) return;

                const adj = {};
                nodes.forEach(n => adj[n] = []);

                connections.forEach(conn => {
                    const [u, v] = conn.split('-');
                    if (adj[u] && adj[v]) { // 노드가 존재할 경우만 연결 추가
                        adj[u].push(v);
                        adj[v].push(u);
                    }
                });

                const visited = new Set();
                const dfs = (node) => {
                    visited.add(node);
                    adj[node].forEach(neighbor => {
                        if (!visited.has(neighbor)) {
                            dfs(neighbor);
                        }
                    });
                };

                dfs(nodes[0]); // 첫 번째 노드에서 시작

                // 모든 노드에 도달했다면 하나의 연결된 그래프가 된 것
                if (visited.size === nodes.length) {
                    document.body.classList.add('all-connected');
                } else {
                    document.body.classList.remove('all-connected');
                }
            }

            // 창 크기 변경 시 그려진 선들의 좌표도 별 위치에 맞게 업데이트
            window.addEventListener('resize', () => {
                linesMap.forEach((line, connId) => {
                    const [startName, endName] = connId.split('-');
                    const s = document.querySelector(`.star[data-name="${startName}"]`);
                    const e = document.querySelector(`.star[data-name="${endName}"]`);
                    if (s && e) {
                        const sr = s.getBoundingClientRect();
                        const er = e.getBoundingClientRect();
                        line.setAttribute('x1', sr.left + sr.width / 2);
                        line.setAttribute('y1', sr.top + sr.height / 2);
                        line.setAttribute('x2', er.left + er.width / 2);
                        line.setAttribute('y2', er.top + er.height / 2);
                    }
                });
            });
            // --- 별 연결하기 로직 끝 ---
        });
    </script>
