<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HalliGalli</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Poppins:wght@600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Jua', sans-serif;
            background: linear-gradient(135deg, #fffeb3 0%, #b8f2cb 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .menu-container {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            padding: 4rem 6rem;
            border-radius: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-20px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        h1.title {
            font-family: 'Jua', sans-serif;
            font-size: 5rem;
            color: #5d4037;
            text-shadow: 4px 4px 0px #fff, 8px 8px 0px rgba(0, 0, 0, 0.1);
            margin-bottom: 3rem;
            letter-spacing: 5px;
        }

        .start-btn {
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
            font-weight: 600;
            color: #fff;
            background: #5d4037;
            border: none;
            padding: 1rem 3rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(93, 64, 55, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        .start-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: all 0.5s ease;
        }

        .start-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 25px rgba(93, 64, 55, 0.4);
        }

        .start-btn:hover::after {
            left: 100%;
        }

        .start-btn:active {
            transform: translateY(2px) scale(0.95);
            box-shadow: 0 5px 10px rgba(93, 64, 55, 0.3);
        }

        @keyframes floatCenter {
            0% { transform: translateY(-50%); }
            50% { transform: translateY(calc(-50% - 20px)); }
            100% { transform: translateY(-50%); }
        }

        .side-carousel {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.6);
            padding: 0.5rem 1rem;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            z-index: 50;
            backdrop-filter: blur(5px);
            transition: opacity 0.5s ease, transform 0.5s ease;
            animation: floatCenter 6s ease-in-out infinite;
        }
        .difficulty-carousel {
            left: 5rem;
        }

        .player-carousel {
            right: 5rem;
        }

        .carousel-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
        }

        .side-carousel button {
            background: transparent;
            border: none;
            font-size: 2rem;
            font-weight: bold;
            font-family: 'Jua', sans-serif;
            color: #5d4037;
            cursor: pointer;
            transition: transform 0.2s;
            line-height: 1;
        }

        .side-carousel button:hover {
            transform: scale(1.2);
        }

        .carousel-display {
            font-size: 1.2rem;
            font-family: 'Poppins', sans-serif;
            font-weight: bold;
            color: #5d4037;
            width: 4rem;
            text-align: center;
            text-transform: capitalize;
            user-select: none;
        }

        .fruit {
            position: absolute;
            user-select: none;
            pointer-events: none;
            animation: floatUp linear infinite;
            z-index: 1;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
        }

        @keyframes floatUp {
            0% {
                transform: translateY(110vh) rotate(0deg) scale(0.8);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-20vh) rotate(360deg) scale(1.2);
                opacity: 0;
            }
        }

        .game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: none;
            /* JS will change it to flex */
            justify-content: center;
            align-items: center;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .table {
            width: 95vmin;
            height: 95vmin;
            background: radial-gradient(circle, #ecdcc8 0%, #c4aa94 100%);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2), inset 0 0 40px rgba(93, 64, 55, 0.4);
            border: 1.5vmin solid #a68b75;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bell {
            width: 16vmin;
            height: 16vmin;
            background: radial-gradient(circle at 35% 35%, #ffffff 0%, #c5c5c5 40%, #7d7d7d 100%);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5), inset -2vmin -2vmin 4vmin rgba(0, 0, 0, 0.4);
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .bell::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4vmin;
            height: 4vmin;
            background: radial-gradient(circle at 35% 35%, #ff8a8a 0%, #d32f2f 100%);
            border-radius: 50%;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.5);
        }

        .bell:active, .bell.active-pressed {
            transform: translate(-50%, -48%) scale(0.96);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5), inset -2vmin -2vmin 4vmin rgba(0, 0, 0, 0.4);
        }

        .player-station {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1.5vmin;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .cards-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1vmin;
        }

        .deck {
            position: relative;
            width: 12vmin;
            height: 18vmin;
            background-color: #ff7f50;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 1vmin, rgba(255, 255, 255, 0.25) 1vmin, rgba(255, 255, 255, 0.25) 2vmin);
            border: 0.6vmin solid #fff;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3),
                1px 1px 0px #fff,
                2px 2px 0px #fff,
                3px 3px 0px #d5baa8;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .deck.empty {
            visibility: hidden;
            pointer-events: none;
        }

        .face-up-card {
            position: relative;
            width: 12vmin;
            height: 18vmin;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 3vmin;
            flex-wrap: wrap;
            padding: 1vmin;
            align-content: center;
            text-align: center;
            transition: all 0.3s ease;
        }

        .station-info {
            background: rgba(255, 255, 255, 0.85);
            padding: 0.5vmin 1.5vmin;
            border-radius: 15px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            color: #5d4037;
            text-align: center;
            font-size: 2vmin;
            white-space: nowrap;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, opacity 0.3s ease, border 0.3s ease;
            border: 0.3vmin solid transparent;
        }

        .player-station.active-turn .station-info {
            transform: scale(1.15);
            border: 0.3vmin solid #ff7f50;
            opacity: 1;
        }
        
        .player-station.active-turn .deck {
            transform: scale(1.05);
            opacity: 1;
        }

        .player-station.inactive-turn .station-info {
            opacity: 0.5;
        }

        .player-station.inactive-turn .deck {
            opacity: 0.5;
        }

        .player-station.bankrupt .station-info {
            opacity: 0.3;
            background: rgba(200, 200, 200, 0.85);
            text-decoration: line-through;
        }

        .pending-counter {
            position: absolute;
            top: 50%;
            right: 2rem;
            transform: translateY(-50%);
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: #d32f2f;
            background: rgba(255, 255, 255, 0.8);
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            z-index: 30;
            display: none; /* 화면에서 숨김 처리 */
        }

        @keyframes flipIn {
            0% {
                transform: translateX(20%) rotateY(90deg) scale(0.9);
                opacity: 0;
            }
            100% {
                transform: translateX(-50%) rotateY(0deg) scale(1);
                opacity: 1;
            }
        }

        .flip-anim {
            animation: flipIn 0.3s ease-out forwards;
        }

        .game-over-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
            animation: fadeIn 0.5s ease forwards;
        }

        .game-over-icon {
            font-size: 8rem;
            margin-bottom: 1rem;
            animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .game-over-title {
            font-family: 'Jua', sans-serif;
            font-size: 6rem;
            text-shadow: 4px 4px 0px rgba(0, 0, 0, 0.5);
            margin-bottom: 2rem;
            animation: slideUp 0.8s ease;
        }

        .victory-text {
            color: #ffd700;
        }

        .lose-text {
            color: #a0a0a0;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes slideUp {
            0% { transform: translateY(50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .settings-icon {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            font-size: 2.5rem;
            cursor: pointer;
            color: #5d4037;
            transition: transform 0.3s ease, opacity 0.3s ease;
            opacity: 0.8;
            z-index: 50;
        }

        .settings-icon:hover {
            transform: rotate(90deg) scale(1.1);
            opacity: 1;
        }

        .settings-modal {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .settings-modal.show {
            opacity: 1;
        }

        .settings-content {
            background: rgba(255, 255, 255, 0.95);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            font-family: 'Poppins', sans-serif;
            color: #5d4037;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .settings-modal.show .settings-content {
            transform: scale(1);
        }

        .settings-content h2 {
            font-family: 'Jua', sans-serif;
            font-size: 3rem;
            margin-top: 0;
            margin-bottom: 2rem;
        }

        .vol-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 2rem;
        }

        .vol-control input[type="range"] {
            width: 15rem;
            accent-color: #ff7f50;
        }

        .vol-control input[type="checkbox"] {
            transform: scale(1.5);
            accent-color: #ff7f50;
        }
    </style>
</head>

<body>
    <div class="menu-container">
        <div class="settings-icon" title="설정">⚙️</div>
        <h1 class="title">할리갈리</h1>

        <button class="start-btn" style="margin-top: 2rem;">Start</button>
    </div>

    <div class="side-carousel difficulty-carousel" id="difficulty-carousel">
        <div class="carousel-controls">
            <button id="diff-prev">&lt;</button>
            <span class="carousel-display" id="diff-display">Easy</span>
            <button id="diff-next">&gt;</button>
        </div>
    </div>

    <div class="side-carousel player-carousel" id="player-carousel">
        <div class="carousel-controls">
            <button id="player-prev">&lt;</button>
            <span class="carousel-display" id="player-display">2명</span>
            <button id="player-next">&gt;</button>
        </div>
    </div>

    <div class="game-over-modal" id="game-over-modal">
        <div class="game-over-icon" id="game-over-icon"></div>
        <h1 class="game-over-title" id="game-over-title"></h1>
        <button class="start-btn" onclick="location.reload()">Retry</button>
    </div>

    <div class="settings-modal" id="settings-modal">
        <div class="settings-content">
            <h2>설정</h2>
            <div class="vol-control">
                <label for="mute-toggle">전체 음소거</label>
                <input type="checkbox" id="mute-toggle">
            </div>
            <div class="vol-control">
                <label for="card-vol-slider">카드 넘기는 소리</label>
                <input type="range" id="card-vol-slider" min="0" max="1" step="0.1" value="1">
            </div>
            <div class="vol-control">
                <label for="bell-vol-slider">종 치는 소리</label>
                <input type="range" id="bell-vol-slider" min="0" max="1" step="0.1" value="1">
            </div>
            <button class="start-btn" id="close-settings-btn" style="padding: 1rem 3rem; font-size: 1.5rem; margin-top: 1rem;">닫기</button>
        </div>
    </div>

    <div class="game-container" id="game-container">
        <div class="pending-counter" id="pending-counter">Pending: 0</div>

        <div class="table" id="game-table">
            <div class="bell" id="bell-btn"></div>
            <!-- Player stations will be appended here dynamically -->
        </div>
    </div>

    <script>
        const bgFruits = ['🍌', '🍇', '🍓', '🍎', '🍋‍🟩'];
        const gameFruits = ['🍓', '🍎', '🍌', '🍇', '🍋‍🟩'];
        const container = document.body;

        // ---- Web Audio API (Sound Effects) ----
        let audioCtx;
        let cardGainNode, bellGainNode;
        let cardVolume = 1.0;
        let bellVolume = 1.0;
        let isMuted = false;

        function updateVolume() {
            if (cardGainNode) cardGainNode.gain.value = isMuted ? 0 : cardVolume;
            if (bellGainNode) bellGainNode.gain.value = isMuted ? 0 : bellVolume;
        }

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                cardGainNode = audioCtx.createGain();
                bellGainNode = audioCtx.createGain();
                
                cardGainNode.connect(audioCtx.destination);
                bellGainNode.connect(audioCtx.destination);
                updateVolume();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playBellSound() {
            if (!audioCtx) return;
            const freqs = [1200, 1600, 2400];
            freqs.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.3 / (i + 1), audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
                osc.connect(gain);
                gain.connect(bellGainNode);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.8);
            });
        }

        function playCardFlipSound() {
            if (!audioCtx) return;
            // 종이 넘기는 사아악(마찰음) 소리를 위해 화이트 노이즈 버퍼 생성
            const bufferSize = audioCtx.sampleRate * 0.15; // 0.15초 길이
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1; // 노이즈 생성
            }
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            
            // 필터로 부드러운 마찰음 대역 설정
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1000, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.15);
            
            // 자연스러운 볼륨 감소 Envelope 적용
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.05); // 사-
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15); // 아악
            
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(cardGainNode);
            
            noise.start();
        }

        // ---- Game State ----
        let players = [];
        let pendingCardsPool = [];
        let currentPlayerIndex = 0;
        let aiFlipTimer = null;
        let aiRingTimers = [];
        let currentDifficulty = 'easy';
        let isGameStarted = false;

        // ---- DOM Elements ----
        const startBtn = document.querySelector('.start-btn');
        const menuContainer = document.querySelector('.menu-container');
        const gameContainer = document.getElementById('game-container');
        const gameTable = document.getElementById('game-table');
        const elPendingCount = document.getElementById('pending-counter');
        const elBellBtn = document.getElementById('bell-btn');

        function initGame() {
            isGameStarted = true;
            let deck = [];
            for (let f of gameFruits) {
                for (let i = 0; i < 20; i++) {
                    let count = Math.floor(Math.random() * 5) + 1; // 1~5
                    deck.push({ fruit: f, count: count });
                }
            }
            deck.sort(() => Math.random() - 0.5);

            players = [];
            const cardsPerPlayer = Math.floor(100 / playerCount);
            
            document.querySelectorAll('.player-station').forEach(el => el.remove());

            for (let i = 0; i < playerCount; i++) {
                const isAI = (i !== 0); // Player 0 is human, others are AI
                const playerDeck = deck.slice(i * cardsPerPlayer, (i + 1) * cardsPerPlayer);
                
                const station = document.createElement('div');
                station.className = 'player-station';
                
                const angle = (Math.PI / 2) + (i * (2 * Math.PI / playerCount));
                const radius = 38; // vmin
                const left = 50 + radius * Math.cos(angle);
                const top = 50 + radius * Math.sin(angle);
                
                station.style.left = left + '%';
                station.style.top = top + '%';

                const info = document.createElement('div');
                info.className = 'station-info';
                
                const cardsContainer = document.createElement('div');
                cardsContainer.className = 'cards-container';

                const deckEl = document.createElement('div');
                deckEl.className = 'deck';
                if (!isAI) {
                    deckEl.addEventListener('click', () => {
                        if (currentPlayerIndex === 0) flipCard(0);
                    });
                }
                
                const faceUpEl = document.createElement('div');
                faceUpEl.className = 'face-up-card';
                
                cardsContainer.appendChild(faceUpEl);
                cardsContainer.appendChild(deckEl);
                station.appendChild(cardsContainer);
                station.appendChild(info);
                
                gameTable.appendChild(station);

                players.push({
                    id: i,
                    isAI: isAI,
                    deckArr: playerDeck,
                    faceUpCard: null,
                    elStation: station,
                    elInfo: info,
                    elDeck: deckEl,
                    elFaceUp: faceUpEl,
                    isBankrupt: false
                });
            }

            pendingCardsPool = [];
            currentPlayerIndex = Math.floor(Math.random() * playerCount);
            updateUI();
            
            if (players[currentPlayerIndex].isAI) {
                triggerAITurnIfNeeded();
            }
        }

        function updateUI() {
            elPendingCount.innerText = `Pending: ${pendingCardsPool.length}`;

            players.forEach((p, idx) => {
                const name = p.isAI ? `AI ${p.id}` : 'Player';
                p.elInfo.innerText = `${name}: ${p.deckArr.length}`;

                if (p.deckArr.length === 0) {
                    p.elDeck.classList.add('empty');
                } else {
                    p.elDeck.classList.remove('empty');
                }

                p.elStation.classList.remove('active-turn', 'inactive-turn', 'bankrupt');
                if (p.isBankrupt) {
                    p.elStation.classList.add('bankrupt');
                } else if (idx === currentPlayerIndex) {
                    p.elStation.classList.add('active-turn');
                } else {
                    p.elStation.classList.add('inactive-turn');
                }

                renderCard(p.elFaceUp, p.faceUpCard);
            });
        }

        function renderCard(element, cardObj) {
            if (!cardObj) {
                element.style.display = 'none';
                element.innerHTML = '';
                element._lastCard = null;
            } else {
                element.style.display = 'flex';
                let str = '';
                for (let i = 0; i < cardObj.count; i++) str += cardObj.fruit;
                element.innerText = str;
                
                // 새로운 카드가 뒤집혔을 때만 애니메이션 실행
                if (element._lastCard !== cardObj) {
                    element.classList.remove('flip-anim');
                    void element.offsetWidth; // Reflow
                    element.classList.add('flip-anim');
                    element._lastCard = cardObj;
                }
            }
        }

        function flipCard(pIndex) {
            clearTimeout(aiFlipTimer);
            if (pIndex !== currentPlayerIndex) return;
            const p = players[pIndex];
            if (p.isBankrupt || p.deckArr.length === 0) {
                cycleTurn();
                return;
            }

            playCardFlipSound();
            if (p.faceUpCard) pendingCardsPool.push(p.faceUpCard);
            p.faceUpCard = p.deckArr.pop();
            
            if (p.deckArr.length === 0 && !p.isBankrupt) {
                p.isBankrupt = true;
            }

            cycleTurn();
            updateUI();
            if (checkGameOver()) return;
            checkAIBell(pIndex);
        }

        function triggerAITurnIfNeeded() {
            if (isGameStarted && players[currentPlayerIndex].isAI && !players[currentPlayerIndex].isBankrupt) {
                let flipDelay;
                if (currentDifficulty === 'hard') {
                    flipDelay = Math.random() * 700 + 800;
                } else if (currentDifficulty === 'normal') {
                    flipDelay = 1000;
                } else {
                    flipDelay = 1500;
                }
                aiFlipTimer = setTimeout(() => {
                    flipCard(currentPlayerIndex);
                }, flipDelay);
            }
        }

        function cycleTurn() {
            let limit = players.length;
            while(limit > 0) {
                currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
                if (!players[currentPlayerIndex].isBankrupt) {
                    break;
                }
                limit--;
            }
            if (!players[currentPlayerIndex].isBankrupt && players[currentPlayerIndex].isAI) {
                triggerAITurnIfNeeded();
            }
        }

        function getSumOfFruits() {
            const counts = {};
            players.forEach(p => {
                if (p.faceUpCard) {
                    counts[p.faceUpCard.fruit] = (counts[p.faceUpCard.fruit] || 0) + p.faceUpCard.count;
                }
            });
            return counts;
        }

        function ringBell(ringerIndex) {
            playBellSound();
            clearTimeout(aiFlipTimer);
            aiRingTimers.forEach(t => clearTimeout(t));
            aiRingTimers = [];

            const p = players[ringerIndex];
            if (p.isBankrupt) return;

            const sum = getSumOfFruits();
            let hasFive = false;
            for (let f in sum) {
                if (sum[f] === 5) hasFive = true;
            }

            if (hasFive) {
                let reward = [...pendingCardsPool];
                players.forEach(pl => {
                    if (pl.faceUpCard) {
                        reward.push(pl.faceUpCard);
                        pl.faceUpCard = null;
                    }
                });
                p.deckArr = reward.concat(p.deckArr);
                pendingCardsPool = [];
                currentPlayerIndex = ringerIndex;
            } else {
                const otherPlayers = players.filter(pl => pl.id !== ringerIndex && !pl.isBankrupt);
                otherPlayers.forEach(pl => {
                    if (p.deckArr.length > 0) {
                        pl.deckArr.unshift(p.deckArr.pop());
                    }
                });

                if (p.deckArr.length === 0) p.isBankrupt = true;
                
                players.forEach(pl => {
                    if (pl.faceUpCard) {
                        pendingCardsPool.push(pl.faceUpCard);
                        pl.faceUpCard = null;
                    }
                });
            }

            updateUI();
            if (checkGameOver()) return;
            
            if (players[currentPlayerIndex].isAI) {
                triggerAITurnIfNeeded();
            }
        }

        function checkAIBell(whoFlippedIndex) {
            aiRingTimers.forEach(t => clearTimeout(t));
            aiRingTimers = [];

            const sum = getSumOfFruits();
            let hasFive = false;
            for (let f in sum) if (sum[f] === 5) hasFive = true;

            const activeAIs = players.filter(p => p.isAI && !p.isBankrupt);
            
            activeAIs.forEach(ai => {
                let shouldRing = hasFive;
                
                if (!hasFive && whoFlippedIndex !== ai.id) {
                    const rand = Math.random();
                    if (currentDifficulty === 'hard' && rand < 0.01) shouldRing = true;
                    else if (currentDifficulty === 'normal' && rand < 0.05) shouldRing = true;
                    else if (currentDifficulty === 'easy' && rand < 0.10) shouldRing = true;
                }

                if (shouldRing) {
                    let minT, maxT;
                    if (currentDifficulty === 'hard') { minT = 500; maxT = 800; }
                    else if (currentDifficulty === 'normal') { minT = 1000; maxT = 1500; }
                    else { minT = 1000; maxT = 2000; }
                    
                    const reactionTime = Math.random() * (maxT - minT) + minT;
                    const t = setTimeout(() => {
                        ringBell(ai.id);
                    }, reactionTime);
                    aiRingTimers.push(t);
                }
            });
        }

        function checkGameOver() {
            const activePlayers = players.filter(p => !p.isBankrupt);
            if (activePlayers.length <= 1) {
                if (activePlayers.length === 1 && activePlayers[0].id === 0) {
                    showGameOver('victory');
                } else {
                    showGameOver('lose');
                }
                return true;
            }
            if (players[0].isBankrupt) {
                showGameOver('lose');
                return true;
            }
            return false;
        }

        function showGameOver(result) {
            isGameStarted = false;
            const modal = document.getElementById('game-over-modal');
            const icon = document.getElementById('game-over-icon');
            const title = document.getElementById('game-over-title');
            
            if (result === 'victory') {
                icon.innerText = '👑';
                title.innerText = 'Victory!';
                title.className = 'game-over-title victory-text';
            } else {
                icon.innerText = '💀';
                title.innerText = 'Lose';
                title.className = 'game-over-title lose-text';
            }
            
            modal.style.display = 'flex';
        }

        // ---- Event Listeners ----
        const elSettingsModal = document.getElementById('settings-modal');
        const elSettingsBtn = document.querySelector('.settings-icon');
        const elCloseSettingsBtn = document.getElementById('close-settings-btn');
        const elMuteToggle = document.getElementById('mute-toggle');
        const elCardVolSlider = document.getElementById('card-vol-slider');
        const elBellVolSlider = document.getElementById('bell-vol-slider');

        elSettingsBtn.addEventListener('click', () => {
            initAudio(); // 권한 먼저 획득
            elSettingsModal.style.display = 'flex';
            setTimeout(() => elSettingsModal.classList.add('show'), 10);
        });

        elCloseSettingsBtn.addEventListener('click', () => {
            elSettingsModal.classList.remove('show');
            setTimeout(() => elSettingsModal.style.display = 'none', 300);
        });

        elMuteToggle.addEventListener('change', (e) => {
            isMuted = e.target.checked;
            updateVolume();
        });

        elCardVolSlider.addEventListener('input', (e) => {
            cardVolume = parseFloat(e.target.value);
            updateVolume();
        });

        elCardVolSlider.addEventListener('change', () => {
            if (!isMuted) playCardFlipSound();
        });

        elBellVolSlider.addEventListener('input', (e) => {
            bellVolume = parseFloat(e.target.value);
            updateVolume();
        });

        elBellVolSlider.addEventListener('change', () => {
            if (!isMuted) playBellSound();
        });

        startBtn.addEventListener('click', () => {
            initAudio(); // Initialize audio context on first user interaction
            initGame(); // Initialize cards
            menuContainer.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
            menuContainer.style.opacity = '0';
            menuContainer.style.transform = 'scale(0.95)';

            const elDifficultyCarousel = document.getElementById('difficulty-carousel');
            const elPlayerCarousel = document.getElementById('player-carousel');
            
            elDifficultyCarousel.style.opacity = '0';
            elDifficultyCarousel.style.transform = 'translateY(-50%) scale(0.95)';
            elPlayerCarousel.style.opacity = '0';
            elPlayerCarousel.style.transform = 'translateY(-50%) scale(0.95)';

            setTimeout(() => {
                menuContainer.style.display = 'none';
                elDifficultyCarousel.style.display = 'none';
                elPlayerCarousel.style.display = 'none';
                gameContainer.style.display = 'flex';
                void gameContainer.offsetWidth;
                gameContainer.style.opacity = '1';
            }, 500);
        });

        const difficulties = ['easy', 'normal', 'hard'];
        let diffIndex = 0; // Starts at 'easy'
        const elDiffDisplay = document.getElementById('diff-display');
        const elDiffPrev = document.getElementById('diff-prev');
        const elDiffNext = document.getElementById('diff-next');

        elDiffPrev.addEventListener('click', () => {
            diffIndex = (diffIndex - 1 + difficulties.length) % difficulties.length;
            currentDifficulty = difficulties[diffIndex];
            elDiffDisplay.innerText = currentDifficulty;
        });

        elDiffNext.addEventListener('click', () => {
            diffIndex = (diffIndex + 1) % difficulties.length;
            currentDifficulty = difficulties[diffIndex];
            elDiffDisplay.innerText = currentDifficulty;
        });

        let playerCount = 2; // Default 2
        const elPlayerDisplay = document.getElementById('player-display');
        const elPlayerPrev = document.getElementById('player-prev');
        const elPlayerNext = document.getElementById('player-next');

        elPlayerPrev.addEventListener('click', () => {
            playerCount--;
            if (playerCount < 2) playerCount = 5;
            elPlayerDisplay.innerText = playerCount + '명';
        });

        elPlayerNext.addEventListener('click', () => {
            playerCount++;
            if (playerCount > 5) playerCount = 2;
            elPlayerDisplay.innerText = playerCount + '명';
        });

        elBellBtn.addEventListener('click', () => {
            if (isGameStarted) ringBell(0); // 0 is player
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (isGameStarted) {
                    elBellBtn.classList.add('active-pressed');
                    setTimeout(() => elBellBtn.classList.remove('active-pressed'), 100);
                    ringBell(0);
                }
            }
        });

        // ---- Background Animation ----
        function createFruit() {
            const fruit = document.createElement('div');
            fruit.classList.add('fruit');
            fruit.innerText = bgFruits[Math.floor(Math.random() * bgFruits.length)];
            fruit.style.left = Math.random() * 90 + 'vw';
            const duration = Math.random() * 8 + 8;
            fruit.style.animationDuration = duration + 's';
            const size = Math.random() * 2 + 2.5;
            fruit.style.fontSize = size + 'rem';
            container.appendChild(fruit);
            setTimeout(() => fruit.remove(), duration * 1000);
        }

        setInterval(createFruit, 600);
        for (let i = 0; i < 8; i++) setTimeout(createFruit, i * 300);
    </script>
</body>

</html>
